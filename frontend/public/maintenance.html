<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Maintenance — RateMyHusky</title>
  <link rel="icon" href="/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #d6394c;
      --red-dark:   #b82e3f;
      --red-alpha:  rgba(214, 57, 76, 0.1);
      --bg:         #f5f5f5;
      --card-bg:    #ffffff;
      --card-border:#e8e8e8;
      --visual-bg:  #f8f8f8;
      --h1:         #1f1f1f;
      --body:       #666666;
      --shadow:     rgba(0, 0, 0, 0.08);
      --shadow-vis: rgba(0, 0, 0, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #1a1a1a;
        --card-bg:    #242424;
        --card-border:#333333;
        --visual-bg:  #2a2a2a;
        --h1:         #f3f3f3;
        --body:       #b0b0b0;
        --shadow:     rgba(0, 0, 0, 0.28);
        --shadow-vis: rgba(0, 0, 0, 0.32);
      }
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
    }

    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      .navbar {
        background: rgba(26, 26, 26, 0.88);
        border-bottom-color: rgba(255, 255, 255, 0.06);
      }
    }

    .navbar-logo {
      font-size: 1.25rem;
      font-weight: 900;
      text-decoration: none;
      color: var(--h1);
      letter-spacing: -0.02em;
    }

    .navbar-logo span {
      color: var(--red);
    }

    /* ── Main ──────────────────────────────────────────────── */
    .main {
      position: relative;
      flex: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 112px 24px 72px;
      overflow: hidden;
    }

    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(214, 57, 76, 0.12) 0, transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(214, 57, 76, 0.08) 0, transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.82) 0%, rgba(245,245,245,0.96) 100%);
      pointer-events: none;
    }

    @media (prefers-color-scheme: dark) {
      .main::before {
        background:
          radial-gradient(circle at 18% 20%, rgba(214, 57, 76, 0.18) 0, transparent 28%),
          radial-gradient(circle at 82% 14%, rgba(214, 57, 76, 0.12) 0, transparent 24%),
          linear-gradient(180deg, rgba(23,23,23,0.94) 0%, rgba(28,28,28,0.98) 100%);
      }
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 0 clamp(16px, 3vw, 48px);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 36px;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      padding: 42px;
      box-shadow: 0 24px 60px var(--shadow);
      position: relative;
      z-index: 2;
    }

    /* ── Copy ──────────────────────────────────────────────── */
    .copy { max-width: 580px; }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--red-alpha);
      color: var(--red);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
    }

    .kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      /* pulse animation */
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    .copy h1 {
      font-size: clamp(2.9rem, 7vw, 5.3rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      color: var(--h1);
      margin-bottom: 18px;
    }

    .copy p {
      font-size: 1.08rem;
      line-height: 1.7;
      color: var(--body);
      max-width: 48ch;
    }

    .eta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--red-alpha);
      border: 1px solid rgba(214, 57, 76, 0.18);
      color: var(--red);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .eta svg { flex-shrink: 0; }

    /* ── Visual ────────────────────────────────────────────── */
    .visual {
      position: relative;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-glow {
      position: absolute;
      inset: 12% 10%;
      background: radial-gradient(circle, rgba(214, 57, 76, 0.2) 0%, rgba(214, 57, 76, 0.03) 56%, transparent 74%);
      filter: blur(8px);
    }

    .visual-card {
      position: relative;
      width: min(100%, 450px);
      aspect-ratio: 0.95;
      padding: 28px;
      border-radius: 30px;
      background: var(--visual-bg);
      border: 1px solid rgba(214, 57, 76, 0.12);
      box-shadow: 0 28px 48px var(--shadow-vis);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      .visual-card { border-color: rgba(214, 57, 76, 0.18); }
    }

    /* wrench + cog icon */
    .tools-icon {
      width: clamp(140px, 50%, 200px);
      filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.12));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50%       { transform: translateY(-10px) rotate(4deg); }
    }

    /* ── Footer ────────────────────────────────────────────── */
    .footer {
      padding: 24px;
      text-align: center;
      font-size: 0.83rem;
      color: var(--body);
      border-top: 1px solid var(--card-border);
    }

    .footer a {
      color: var(--red);
      text-decoration: none;
      font-weight: 700;
    }

    .footer a:hover { text-decoration: underline; }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 980px) {
      .main  { padding-top: 96px; }
      .hero  { grid-template-columns: 1fr; padding: 32px; }
      .copy  { max-width: none; }
      .copy p { max-width: none; }
      .visual { min-height: 360px; }
    }

    @media (max-width: 640px) {
      .main { padding: 88px 16px 56px; }
      .hero { gap: 26px; padding: 24px; border-radius: 24px; }
      .copy h1 { font-size: clamp(2.5rem, 14vw, 3.6rem); }
      .copy p  { font-size: 1rem; }
      .visual-card { width: 100%; padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <nav class="navbar" aria-label="Site navigation">
      <a href="/" class="navbar-logo">Rate<span>MyHusky</span></a>
    </nav>

    <main class="main">
      <div class="shell">
        <div class="hero">

          <div class="copy">
            <span class="kicker">Scheduled Maintenance</span>
            <h1>We'll be right&nbsp;back.</h1>
            <p>
              RateMyHusky is temporarily offline while we perform scheduled
              maintenance. We're working quickly to get things back up — thanks
              for your patience.
            </p>
            <div class="eta" aria-live="polite">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              Expected downtime: a few minutes
            </div>
          </div>

          <div class="visual" aria-hidden="true">
            <div class="visual-glow"></div>
            <div class="visual-card">
              <!-- Wrench + cog SVG illustration -->
              <svg class="tools-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <!-- Cog -->
                <g transform="translate(105, 55)">
                  <circle cx="0" cy="0" r="22" fill="rgba(214,57,76,0.15)" stroke="#d6394c" stroke-width="3"/>
                  <circle cx="0" cy="0" r="10" fill="rgba(214,57,76,0.2)" stroke="#d6394c" stroke-width="2.5"/>
                  <!-- Gear teeth -->
                  <rect x="-4" y="-30" width="8" height="10" rx="2" fill="#d6394c"/>
                  <rect x="-4" y="20"  width="8" height="10" rx="2" fill="#d6394c"/>
                  <rect x="-30" y="-4" width="10" height="8" rx="2" fill="#d6394c"/>
                  <rect x="20"  y="-4" width="10" height="8" rx="2" fill="#d6394c"/>
                  <rect x="-23" y="-23" width="8" height="8" rx="2" fill="#d6394c" transform="rotate(45 -19 -19)"/>
                  <rect x="15"  y="-23" width="8" height="8" rx="2" fill="#d6394c" transform="rotate(45 19 -19)"/>
                  <rect x="-23" y="15"  width="8" height="8" rx="2" fill="#d6394c" transform="rotate(45 -19 19)"/>
                  <rect x="15"  y="15"  width="8" height="8" rx="2" fill="#d6394c" transform="rotate(45 19 19)"/>
                </g>
                <!-- Wrench body -->
                <g transform="translate(20, 60) rotate(-35)">
                  <!-- Wrench head -->
                  <path d="M10 0 C10 -14 30 -20 36 -10 L28 -4 L26 -12 C22 -16 14 -14 12 -8 C10 -2 14 4 20 4 L28 4 L36 10 C30 20 10 14 10 0Z" fill="#d6394c" opacity="0.9"/>
                  <!-- Wrench handle -->
                  <rect x="16" y="4" width="12" height="90" rx="6" fill="#d6394c" opacity="0.85"/>
                  <!-- Handle grip lines -->
                  <rect x="17" y="40" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
                  <rect x="17" y="52" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
                  <rect x="17" y="64" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
                  <!-- Wrench bottom open end -->
                  <path d="M16 94 C16 108 28 108 28 94" fill="none" stroke="#d6394c" stroke-width="3" opacity="0.85"/>
                </g>
                <!-- Small sparkles -->
                <circle cx="60"  cy="40"  r="3" fill="rgba(214,57,76,0.5)"/>
                <circle cx="155" cy="140" r="4" fill="rgba(214,57,76,0.35)"/>
                <circle cx="40"  cy="150" r="2.5" fill="rgba(214,57,76,0.4)"/>
                <circle cx="170" cy="80"  r="3" fill="rgba(214,57,76,0.3)"/>
              </svg>
            </div>
          </div>

        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Questions? Reach us at <a href="mailto:contact@ratemyhusky.com">contact@ratemyhusky.com</a></p>
    </footer>

  </div>
</body>
</html>
